<h1>
    student reg
</h1>
<link rel="stylesheet" href="../static/bootstrap.min (19).css" type="text/css"/>
<div class="row">
    <div class="col-3"></div>
    <div class="col-6">
<form method="POST" action="student_reg">
    <div>
      <label  class="form-label mt-4">name</label>
      <input name="t1" type="text" class="form-control" id="exampleInputPassword1" placeholder="enter name" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">enrollment</label>
      <input name="t2" type="text" class="form-control" id="exampleInputPassword2" placeholder="enter enrollment" autocomplete="off">
    </div>
   <div>
      <label  class="form-label mt-4">course</label>
      <input name="t3" type="text" class="form-control" id="exampleInputPassword3" placeholder="enter enter coruse" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">ad year</label>
      <input name="t4" type="text" class="form-control" id="exampleInputPassword4" placeholder="enter ad year" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">address</label>
      <input name="t5" type="text" class="form-control" id="exampleInputPassword5" placeholder="enter address" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">contect</label>
      <input name="t6" type="text" class="form-control" id="exampleInputPassword6" placeholder="enter contect" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">Email</label>
      <input name="t7" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
    </div>
    <div>
      <label  class="form-label mt-4">password</label>
      <input name="t8" type="password" class="form-control" id="exampleInputPassword8" placeholder="enter password" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">confirmpassword</label>
      <input name="t9" type="text" class="form-control" id="exampleInputPassword9" placeholder="enter confirmpassword" autocomplete="off">
    </div>
<br>
    <br>
    <button type="submit" class="btn btn-primary">Register</button>
</form>

{% if vgt %}
<h3>{{vgt}}</h3>
{% endif %}

         </div>
    <div class="col-3"></div>
</div>
