<h1>delete student</h1>
{% if data %}
<link rel="stylesheet" href="../static/bootstrap.min (19).css" type="text/css"/>
<div class="row">
    <div class="col-3"></div>
    <div class="col-6">
<form onsubmit="return confirm('Do you really want to delete?')" method="post" action="delete_student1">
     <div>
      <label  class="form-label mt-4">name</label>
      <input name="T1" value="{{data[0]}}" type="text" class="form-control" id="exampleInputPassword2" placeholder="enter name" autocomplete="off">
    </div>
   <div>













       
      <label  class="form-label mt-4">enrollment</label>
      <input name="T2" value="{{data[1]}}" type="text" class="form-control" id="exampleInputPassword3" placeholder="enter enrollment" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">course</label>
      <input name="T3" value="{{data[2]}}" type="text" class="form-control" id="exampleInputPassword4" placeholder="enter course" autocomplete="off">
    </div>
   <div>
      <label  class="form-label mt-4">admission year</label>
      <input name="T4" value="{{data[3]}}" type="text" class="form-control" id="exampleInputPassword5" placeholder="enter admission year" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">address</label>
      <input name="T5" value="{{data[4]}}" type="text" class="form-control" id="exampleInputPassword6" placeholder="enter address" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">contect</label>
      <input name="T6" value="{{data[5]}}" type="text" class="form-control" id="exampleInputPassword7" placeholder="enter contect" autocomplete="off">
    </div>
    <div>
      <label  class="form-label mt-4">Email</label>
      <input name="T7" value="{{data[6]}}" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
    </div>
    <br>

    <button type="submit" class="btn btn-primary">delete</button>

</form>
<h2>
    <a href="show_studentdata">B A C K</a>
</h2>
{% elif msg %}
    <h3>{{msg}}</h3>
{% endif %}
         </div>
    <div class="col-3"></div>
</div>
